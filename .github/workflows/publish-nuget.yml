name: Publish NuGet package

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  publish:
    runs-on: windows-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore RfcClient.csproj

      - name: Pack
        run: dotnet pack RfcClient.csproj --configuration Release --no-restore --property:Platform=x64 --output artifacts

      - name: NuGet login with trusted publishing
        id: login
        uses: NuGet/login@v1
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Publish to NuGet.org
        shell: pwsh
        run: |
          $packages = @(Get-ChildItem artifacts -Filter "RfcClient.*.nupkg")
          if ($packages.Count -ne 1) {
            throw "Expected exactly one NuGet package, found $($packages.Count)."
          }
          $package = $packages[0]
          dotnet nuget push $package.FullName `
            --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" `
            --source "https://api.nuget.org/v3/index.json" `
            --skip-duplicate
